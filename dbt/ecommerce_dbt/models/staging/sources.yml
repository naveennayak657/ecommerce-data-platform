# ──────────────────────────────────────────────────
# Author: Naveen Vishlavath
# File: staging/sources.yml
#
# Defines the raw source tables that dbt reads from.
# This tells dbt exactly where our raw data lives
# in Snowflake and sets up freshness monitoring.
#
# Source freshness alerts:
#   warn  → if no new data in 1 hour
#   error → if no new data in 24 hours
# ──────────────────────────────────────────────────

version: 2

sources:
  - name: raw
    database: ECOMMERCE_DB
    schema: RAW
    description: >
      Raw e-commerce events loaded from Delta Lake Gold layer.
      This is the single source of truth for all downstream models.

    # freshness monitoring — alerts if source data stops arriving
    # critical for production pipelines
    freshness:
      warn_after: { count: 1, period: hour }
      error_after: { count: 24, period: hour }
    loaded_at_field: ingested_at

    tables:
      - name: events
        description: >
          Raw e-commerce events including orders, views,
          cart updates and payment transactions.
        columns:
          - name: event_id
            description: Unique identifier for each event
            tests:
              - unique
              - not_null

          - name: event_type
            description: Type of event
            tests:
              - not_null
              - accepted_values:
                  values:
                    [
                      "order_placed",
                      "item_viewed",
                      "cart_updated",
                      "payment_processed",
                    ]

          - name: user_id
            description: ID of the user who triggered the event
            tests:
              - not_null

          - name: price
            description: Product price at time of event
            tests:
              - not_null

          - name: ingested_at
            description: Timestamp when record was ingested into Snowflake
            tests:
              - not_null
