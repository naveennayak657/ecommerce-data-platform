version: "3.8"

# ──────────────────────────────────────────────────
# Author: Naveen Vishlavath
# Project: E-Commerce Real-Time Data Platform
#
# This file spins up the full local dev environment.
# I chose LocalExecutor for Airflow since we're running
# on a single Mac with 8GB RAM — CeleryExecutor would be
# overkill for local development.
# Kafka runs in KRaft mode to avoid Zookeeper complexity
# since Zookeeper is being deprecated in Kafka 4.0
# ──────────────────────────────────────────────────

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - platform-network

services:
  # ─────────────────────────────────────────
  # KAFKA
  # Using KRaft mode — no Zookeeper needed
  # simpler setup and more modern approach
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      # broker and controller roles in single node
      # fine for local dev, in prod these would be separate
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - platform-network

  # ─────────────────────────────────────────
  # SPARK
  # Running master + worker locally
  # NOTE: kept worker memory at 2G instead of 4G
  # because Mac was running low with everything running
  # 2G handles our event volume fine in local dev
  # ─────────────────────────────────────────
  spark-master:
    image: apache/spark:latest
    container_name: spark-master
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - platform-network

  spark-worker:
    image: apache/spark:latest
    container_name: spark-worker
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - platform-network

  # ─────────────────────────────────────────
  # POSTGRES
  # Only used as Airflow metadata database
  # pipeline data never touches this
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # ─────────────────────────────────────────
  # AIRFLOW
  # Split into 3 services — same as production
  # init: runs once to set up the database
  # webserver: the UI at localhost:8081
  # scheduler: triggers and monitors DAGs
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

# ─────────────────────────────────────────
# VOLUMES
# persistent storage so data survives restarts
# ─────────────────────────────────────────
volumes:
  postgres-data:
  airflow-logs:

# ─────────────────────────────────────────
# NETWORKS
# single shared network so all containers
# can talk to each other by service name
# ─────────────────────────────────────────
networks:
  platform-network:
    driver: bridge
